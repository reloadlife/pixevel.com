# pixevel.com  -> direct (no CDN)
# pixevel.ir   -> behind ArvanCloud CDN (TLS terminates at the edge; origin = HTTP)

# Honor the scheme forwarded by an upstream CDN/proxy. For direct .com hits there
# is no XFP, so we fall back to $scheme. Lets the app treat Arvan https as https.
map $http_x_forwarded_proto $pixevel_proto {
    default $scheme;
    https   https;
    http    http;
}

# Trust the ArvanCloud edge so $remote_addr becomes the REAL visitor IP for .ir
# (drives rate-limiting + analytics). Has no effect on direct .com traffic.
#
# ⚠️ REPLACE with the CURRENT official ArvanCloud IP list before relying on this:
#    https://www.arvancloud.ir  (IP ranges). An over-broad/wrong range here would
#    let clients spoof X-Forwarded-For — keep it tight to Arvan's published CIDRs.
set_real_ip_from 185.143.232.0/22;
set_real_ip_from 188.229.116.0/22;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

server {
    listen 80;
    listen [::]:80;
    server_name pixevel.com www.pixevel.com pixevel.ir www.pixevel.ir 195.24.237.131;

    # Product/watermark uploads go up to ~8-12MB.
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:{{ node_port }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $pixevel_proto;
        proxy_read_timeout 60s;
    }
}
