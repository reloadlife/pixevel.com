name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  biome:
    name: Lint & format (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Biome CI check
        run: bunx biome ci
