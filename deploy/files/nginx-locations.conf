# Shared location blocks for every Pixevel server{} (HTTP + HTTPS). Included via
# `include snippets/pixevel-locations.conf;`. Rendered by pyinfra (app_dir/node_port).

# Hashed, immutable build assets — served straight from disk, cached forever.
location /_next/static/ {
    alias {{ app_dir }}/.next/static/;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
}

# Next image optimizer — let Node handle it (it sets its own cache headers).
location /_next/image {
    proxy_pass http://127.0.0.1:{{ node_port }};
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $pixevel_proto;
}

# User uploads — served from disk (offload Node), cached 30 days.
location /statics/ {
    alias {{ app_dir }}/statics/;
    access_log off;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
}

# Everything else → the Next standalone server. It emits correct cache headers
# for HTML / RSC / data / ISR, so nginx does not cache these.
location / {
    proxy_pass http://127.0.0.1:{{ node_port }};
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $pixevel_proto;
    proxy_read_timeout 60s;
}
