# Pixevel site — rendered by pyinfra. pixevel.com (direct) + pixevel.ir (Arvan CDN).
# The :443 blocks are emitted only when their cert exists on the box.

# `gzip on;` is already set in the default nginx.conf http{} — only tune it here.
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types text/plain text/css application/json application/javascript text/javascript
           application/x-javascript image/svg+xml application/rss+xml application/atom+xml
           font/woff2 application/manifest+json;

# Honor the proto an upstream CDN forwards (Arvan terminates TLS for .ir).
map $http_x_forwarded_proto $pixevel_proto { default $scheme; https https; http http; }

# Trust the ArvanCloud edge so .ir traffic gets the real client IP.
# ⚠️ replace with Arvan's current published ranges before relying on this.
set_real_ip_from 185.143.232.0/22;
set_real_ip_from 188.229.116.0/22;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

server {
    listen 80;
    listen [::]:80;
    server_name pixevel.com www.pixevel.com pixevel.ir www.pixevel.ir 195.24.237.131;
    client_max_body_size 12m;
    include snippets/pixevel-locations.conf;
}
{% if has_com_cert %}
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pixevel.com www.pixevel.com;
    ssl_certificate     /etc/ssl/pixevel/com.crt;
    ssl_certificate_key /etc/ssl/pixevel/com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    client_max_body_size 12m;
    include snippets/pixevel-locations.conf;
}
{% endif %}
{% if has_ir_cert %}
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pixevel.ir www.pixevel.ir;
    ssl_certificate     /etc/ssl/pixevel/ir.crt;
    ssl_certificate_key /etc/ssl/pixevel/ir.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    client_max_body_size 12m;
    include snippets/pixevel-locations.conf;
}
{% endif %}
