name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  biome:
    name: Lint & format (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Biome CI check
        run: npx biome ci
